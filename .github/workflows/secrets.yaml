name: Loop Over a YAML File

on:
  workflow_dispatch: {} 

jobs:
  loop:
    name: Loop Over File
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Print File
        id: print-file
        run: |
          while read name role; do 
            cat >> config <<EOF
          [profile ${name}]
          role_arn = ${role}
          web_identity_token_file = web_identity_token
          region = eu-west-2

          EOF

          echo "::add-mask::${role}"
          done < <(jq -r 'to_entries[] | "\(.key) \(.value)"' <(echo "${GHA_CI_ROLES}"))

          cat config
        env:
          GHA_CI_ROLES: ${{ secrets.GHA_CI_ROLES }}
